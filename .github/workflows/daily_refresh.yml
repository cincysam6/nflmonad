name: NFL Analytics Daily Refresh

on:
  schedule:
    - cron: "0 6 * * 2-4"   # Tue-Thu during season (catches Mon Night and Tue updates)
    - cron: "0 6 * * 0"     # Sunday (pre-game prep)
    - cron: "0 14 * * 2"    # Tuesday afternoon (full post-weekend refresh)

  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode: daily | backfill"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - backfill
      force_full:
        description: "Force full season re-download"
        required: false
        default: "false"
        type: boolean
      season_override:
        description: "Override current_season in config (leave empty to use config)"
        required: false
        type: string

env:
  R_VERSION: "4.3.3"
  RENV_PATHS_CACHE: ~/.local/share/renv
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 now before June 2026 forced migration

jobs:
  refresh:
    name: "${{ github.event.inputs.mode || 'daily' }} refresh"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write
      actions: read

    steps:
      # ---- 1. Checkout -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      # ---- 2. Install R -------------------------------------------------------
      - name: Set up R ${{ env.R_VERSION }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      # ---- 3. Cache R packages (renv) ----------------------------------------
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_CACHE }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      # ---- 4. Install system dependencies ------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      # ---- 5. Install R packages ---------------------------------------------
      - name: Install R packages
        run: |
          Rscript -e "
            if (file.exists('renv.lock')) {
              renv::restore(prompt = FALSE)
            } else {
              source('R/utils/install_packages.R')
            }
          "

      # ---- 6. Override config if needed --------------------------------------
      - name: Apply season override
        if: ${{ github.event.inputs.season_override != '' }}
        run: |
          Rscript -e "
            cfg_path <- 'config/config.yml'
            cfg <- yaml::read_yaml(cfg_path)
            cfg\$seasons\$current_season <- as.integer('${{ github.event.inputs.season_override }}')
            yaml::write_yaml(cfg, cfg_path)
            cat('Set current_season to', cfg\$seasons\$current_season, '\n')
          "

      # ---- 7. Restore data cache ---------------------------------------------
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/staging
            data/intermediate
            data/marts
          key: nfl-data-${{ github.run_id }}
          restore-keys: |
            nfl-data-

      # ---- 8. Run pipeline ---------------------------------------------------
      - name: Run pipeline
        env:
          PIPELINE_MODE:      ${{ github.event.inputs.mode || 'daily' }}
          FORCE_FULL_INPUT:   ${{ github.event.inputs.force_full || 'false' }}
        run: |
          set -euo pipefail

          # Resolve --force-full flag safely
          if [ "$FORCE_FULL_INPUT" = "true" ]; then
            FORCE_FULL_FLAG="--force-full"
          else
            FORCE_FULL_FLAG=""
          fi

          Rscript pipeline.R $PIPELINE_MODE $FORCE_FULL_FLAG
        timeout-minutes: 100

      # ---- 9. Upload logs as artifact ----------------------------------------
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      # ---- 10. Upload marts as artifact (optional) ---------------------------
      - name: Upload mart outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: marts-${{ github.run_id }}
          path: data/marts/
          retention-days: 7

      # ---- 11. Save updated data cache ---------------------------------------
      - name: Save data cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/staging
            data/intermediate
            data/marts
          key: nfl-data-${{ github.run_id }}

      # ---- 12. Notify on failure ---------------------------------------------
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::NFL Analytics pipeline FAILED. Check logs artifact."
